services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: microadmin
      POSTGRES_PASSWORD: microadmin

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microadmin -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  user-service:
    build:
      context: ./user-service

    container_name: user-service
    ports:
      - "8001:8001"
    env_file:
      - ./user-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8002:8002"
    env_file:
      - ./product-service/.env
    depends_on:
      - mongodb

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - product-service

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  mongo_data: