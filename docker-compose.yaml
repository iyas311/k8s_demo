services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: microadmin
      POSTGRES_PASSWORD: microadmin

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build:
      context: ./user-service

    container_name: user-service
    ports:
      - "8001:8001"
    env_file:
      - ./user-service/.env
    depends_on:
      - postgres

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8002:8002"
    env_file:
      - ./product-service/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - product-service

volumes:
  postgres_data: