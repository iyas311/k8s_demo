apiVersion:  apps/v1
kind:  Deployment
metadata:
  name:  mongo
  labels:
    app: mongo_deployment
  namespace: k8s-demo
spec:
  replicas:  1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
